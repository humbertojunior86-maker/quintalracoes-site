<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Categorias — Quintal Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-header">
        <div>
          <div class="breadcrumb">Painel · Categorias</div>
          <h1>Categorias</h1>
        </div>
        <button class="btn btn--mostarda" id="btn-novo">+ Nova categoria</button>
      </div>

      <div class="card" style="background:#fef3d4; padding:12px 16px;">
        Categorias aparecem como círculos no topo da home (cães, gatos, peixes, etc).
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead><tr><th style="width:60px"></th><th>Nome</th><th>Slug</th><th>Ordem</th><th>Status</th><th style="text-align:right">Ações</th></tr></thead>
          <tbody id="lista"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal__header">
        <h2 id="modal-title">Nova categoria</h2>
        <button class="modal__close" data-close>×</button>
      </div>
      <form id="form">
        <input type="hidden" id="c-id">

        <div class="form-group">
          <label class="form-label">Ícone</label>
          <label class="uploader" for="c-icone-input">
            <input type="file" id="c-icone-input" accept="image/*">
            <img id="c-icone-preview" class="preview" style="display:none">
            <div id="c-icone-text">Clique para enviar foto/ícone</div>
          </label>
          <input type="hidden" id="c-icone-url">
        </div>

        <div class="form-group">
          <label class="form-label">Nome *</label>
          <input class="form-control" id="c-nome" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Slug *</label>
            <input class="form-control" id="c-slug" required>
          </div>
          <div class="form-group">
            <label class="form-label">Ordem</label>
            <input type="number" class="form-control" id="c-ordem" value="0">
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex; gap:6px;"><input type="checkbox" id="c-ativo" checked> Ativo</label>
        </div>
        <div class="modal__actions">
          <button type="button" class="btn" data-close>Cancelar</button>
          <button type="submit" class="btn btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/config.js"></script>
  <script type="module">
    import { supabase, requireAuth, uploadImage, toast } from '/admin/js/supabase-client.js';
    import { renderSidebar } from '/admin/js/sidebar.js';

    const auth = await requireAuth(['admin']);
    if (!auth) throw new Error('sem auth');
    renderSidebar(auth.perfil, 'categorias');

    function slugify(s) {
      return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    }
    function escapeHtml(s) {
      return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    async function load() {
      const { data, error } = await supabase.from('categorias').select('*').order('ordem');
      if (error) return toast(error.message,'error');
      document.getElementById('lista').innerHTML = (data || []).map(c => `
        <tr>
          <td>${c.icone_url ? `<img class="thumb" style="border-radius:50%" src="${c.icone_url}">` : `<div class="thumb"></div>`}</td>
          <td><strong>${escapeHtml(c.nome)}</strong></td>
          <td><code style="font-size:11px; color:var(--muted)">${c.slug}</code></td>
          <td>${c.ordem}</td>
          <td>${c.ativo ? '<span class="tag tag--success">ativo</span>' : '<span class="tag tag--danger">inativo</span>'}</td>
          <td><div class="actions">
            <button class="btn btn--sm" data-edit="${c.id}">Editar</button>
            <button class="btn btn--sm btn--danger" data-del="${c.id}">×</button>
          </div></td>
        </tr>
      `).join('') || '<tr><td colspan="6"><div class="empty">Nenhuma categoria.</div></td></tr>';

      document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => abrir(b.dataset.edit));
      document.querySelectorAll('[data-del]').forEach(b => b.onclick = () => excluir(b.dataset.del));
    }

    const modalBg = document.getElementById('modal-bg');
    document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => modalBg.classList.remove('is-open'));
    document.getElementById('btn-novo').onclick = () => abrir();

    document.getElementById('c-nome').addEventListener('input', e => {
      if (!document.getElementById('c-id').value) {
        document.getElementById('c-slug').value = slugify(e.target.value);
      }
    });

    function abrir(id = null) {
      document.getElementById('form').reset();
      document.getElementById('c-id').value = '';
      document.getElementById('c-icone-url').value = '';
      document.getElementById('c-icone-preview').style.display = 'none';
      document.getElementById('c-icone-text').textContent = 'Clique para enviar foto/ícone';
      document.getElementById('modal-title').textContent = 'Nova categoria';
      if (id) carregar(id);
      modalBg.classList.add('is-open');
    }
    async function carregar(id) {
      const { data } = await supabase.from('categorias').select('*').eq('id', id).single();
      document.getElementById('modal-title').textContent = 'Editar categoria';
      document.getElementById('c-id').value = data.id;
      document.getElementById('c-nome').value = data.nome;
      document.getElementById('c-slug').value = data.slug;
      document.getElementById('c-ordem').value = data.ordem;
      document.getElementById('c-ativo').checked = data.ativo;
      document.getElementById('c-icone-url').value = data.icone_url || '';
      if (data.icone_url) {
        const img = document.getElementById('c-icone-preview');
        img.src = data.icone_url; img.style.display = 'block';
      }
    }

    document.getElementById('c-icone-input').addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      const txt = document.getElementById('c-icone-text');
      txt.textContent = 'Enviando…';
      try {
        const url = await uploadImage('categorias', f);
        document.getElementById('c-icone-url').value = url;
        const img = document.getElementById('c-icone-preview');
        img.src = url; img.style.display = 'block';
        txt.textContent = 'Pronto. Clique para trocar.';
      } catch (err) { toast(err.message,'error'); }
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('c-id').value;
      const payload = {
        nome: document.getElementById('c-nome').value.trim(),
        slug: document.getElementById('c-slug').value.trim(),
        icone_url: document.getElementById('c-icone-url').value || null,
        ordem: parseInt(document.getElementById('c-ordem').value || '0', 10),
        ativo: document.getElementById('c-ativo').checked,
      };
      const res = id
        ? await supabase.from('categorias').update(payload).eq('id', id)
        : await supabase.from('categorias').insert(payload);
      if (res.error) return toast(res.error.message, 'error');
      toast(id ? 'Categoria atualizada' : 'Categoria criada', 'success');
      modalBg.classList.remove('is-open');
      load();
    });

    async function excluir(id) {
      if (!confirm('Excluir esta categoria? Produtos vinculados a ela ficarão "sem categoria".')) return;
      const { error } = await supabase.from('categorias').delete().eq('id', id);
      if (error) return toast(error.message,'error');
      toast('Excluída','success');
      load();
    }

    await load();
  </script>
</body>
</html>
