<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Preços — Quintal Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-header">
        <div>
          <div class="breadcrumb">Painel · Preços</div>
          <h1>Atualização rápida de preços</h1>
        </div>
        <button class="btn btn--mostarda" id="btn-salvar-todos">Salvar alterações</button>
      </div>

      <div class="toolbar">
        <input class="search" id="search" placeholder="Buscar produto…">
        <select id="filtro-categoria"><option value="">Todas categorias</option></select>
        <div class="spacer"></div>
        <span id="contador" style="color:var(--muted); font-size:12px;"></span>
      </div>

      <div class="card" style="background:#fef3d4; border-color:#f4d76b; padding:12px 16px;">
        <strong>Dica:</strong> edite vários preços de uma vez e clique em "Salvar alterações" pra registrar tudo de uma vez. Toda mudança fica no histórico.
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="width:60px"></th>
              <th>Produto</th>
              <th>Categoria</th>
              <th style="width:130px">Normal</th>
              <th style="width:130px">Pix</th>
              <th style="width:130px">Promo</th>
              <th style="width:100px">Estoque</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="lista"></tbody>
        </table>
      </div>

      <div class="card" style="margin-top:20px;" id="hist-box">
        <h3 style="margin-top:0; font-family:'Plus Jakarta Sans'">Histórico de alterações</h3>
        <div id="hist-lista"></div>
      </div>
    </main>
  </div>

  <script src="/admin/js/config.js"></script>
  <script type="module">
    import { supabase, requireAuth, fmtBRL, toast } from '/admin/js/supabase-client.js';
    import { renderSidebar } from '/admin/js/sidebar.js';

    const auth = await requireAuth();
    if (!auth) throw new Error('sem auth');
    renderSidebar(auth.perfil, 'precos');

    let produtos = [];
    const dirty = new Map(); // id -> { campo: novoValor }

    async function loadCategorias() {
      const { data } = await supabase.from('categorias').select('id, nome').order('ordem');
      document.getElementById('filtro-categoria').innerHTML = '<option value="">Todas categorias</option>'
        + (data || []).map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
    }

    async function loadProdutos() {
      const search = document.getElementById('search').value.trim();
      const fc = document.getElementById('filtro-categoria').value;
      let q = supabase.from('produtos')
        .select('id, nome, foto_url, preco_normal, preco_pix, preco_promocional, estoque, ativo, categorias(nome)')
        .order('ordem').order('nome');
      if (search) q = q.ilike('nome', `%${search}%`);
      if (fc) q = q.eq('categoria_id', fc);

      const { data, error } = await q;
      if (error) { toast(error.message, 'error'); return; }
      produtos = data;
      document.getElementById('contador').textContent = `${data.length} produtos`;

      document.getElementById('lista').innerHTML = data.length === 0
        ? `<tr><td colspan="8"><div class="empty">Nenhum produto.</div></td></tr>`
        : data.map(p => `
          <tr data-id="${p.id}">
            <td>${p.foto_url ? `<img class="thumb" src="${p.foto_url}">` : `<div class="thumb"></div>`}</td>
            <td>
              <strong>${escapeHtml(p.nome)}</strong>
              ${!p.ativo ? '<span class="tag tag--danger" style="margin-left:6px">inativo</span>' : ''}
            </td>
            <td>${p.categorias?.nome || '—'}</td>
            <td><input type="number" step="0.01" min="0" class="form-control" data-campo="preco_normal" value="${p.preco_normal ?? ''}"></td>
            <td><input type="number" step="0.01" min="0" class="form-control" data-campo="preco_pix" value="${p.preco_pix ?? ''}"></td>
            <td><input type="number" step="0.01" min="0" class="form-control" data-campo="preco_promocional" value="${p.preco_promocional ?? ''}"></td>
            <td><input type="number" min="0" class="form-control" data-campo="estoque" value="${p.estoque ?? 0}"></td>
            <td><span class="tag" id="status-${p.id}" style="display:none">●</span></td>
          </tr>
        `).join('');

      // Marcar dirty
      document.querySelectorAll('#lista input').forEach(inp => {
        inp.addEventListener('input', () => {
          const row = inp.closest('tr');
          const id = row.dataset.id;
          const campo = inp.dataset.campo;
          const val = inp.value === '' ? null : (campo === 'estoque' ? parseInt(inp.value,10) : parseFloat(inp.value));
          if (!dirty.has(id)) dirty.set(id, {});
          dirty.get(id)[campo] = val;
          document.getElementById('status-'+id).style.display = 'inline-block';
          document.getElementById('status-'+id).className = 'tag tag--mostarda';
          document.getElementById('status-'+id).textContent = 'alterado';
        });
      });
    }

    function escapeHtml(s) {
      return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    document.getElementById('btn-salvar-todos').addEventListener('click', async () => {
      if (dirty.size === 0) { toast('Nada para salvar', 'error'); return; }
      const btn = document.getElementById('btn-salvar-todos');
      btn.disabled = true; btn.textContent = 'Salvando…';

      let ok = 0, fail = 0;
      for (const [id, changes] of dirty.entries()) {
        const { error } = await supabase.from('produtos').update(changes).eq('id', id);
        if (error) {
          fail++;
          const el = document.getElementById('status-'+id);
          el.className = 'tag tag--danger'; el.textContent = 'erro';
        } else {
          ok++;
          const el = document.getElementById('status-'+id);
          el.className = 'tag tag--success'; el.textContent = '✓';
        }
      }
      btn.disabled = false; btn.textContent = 'Salvar alterações';
      dirty.clear();
      toast(`${ok} salvos${fail ? `, ${fail} com erro`: ''}`, fail ? 'error' : 'success');
      loadHistorico();
    });

    async function loadHistorico() {
      if (auth.perfil.role !== 'admin') {
        document.getElementById('hist-box').style.display = 'none';
        return;
      }
      const { data } = await supabase
        .from('historico_precos')
        .select('id, alterado_em, preco_normal_old, preco_normal_new, preco_pix_old, preco_pix_new, produtos(nome)')
        .order('alterado_em', { ascending: false })
        .limit(50);

      document.getElementById('hist-lista').innerHTML = (data && data.length > 0)
        ? `<table class="table">
            <thead><tr><th>Quando</th><th>Produto</th><th>Normal: de → para</th><th>Pix: de → para</th></tr></thead>
            <tbody>
              ${data.map(h => `
                <tr>
                  <td>${new Date(h.alterado_em).toLocaleString('pt-BR')}</td>
                  <td>${h.produtos?.nome ?? '—'}</td>
                  <td>${fmtBRL(h.preco_normal_old)} → <strong>${fmtBRL(h.preco_normal_new)}</strong></td>
                  <td>${fmtBRL(h.preco_pix_old)} → <strong>${fmtBRL(h.preco_pix_new)}</strong></td>
                </tr>
              `).join('')}
            </tbody></table>`
        : '<p style="color:var(--muted); margin:0;">Sem histórico ainda.</p>';
    }

    let timer;
    document.getElementById('search').addEventListener('input', () => {
      clearTimeout(timer); timer = setTimeout(loadProdutos, 300);
    });
    document.getElementById('filtro-categoria').addEventListener('change', loadProdutos);

    await loadCategorias();
    await loadProdutos();
    await loadHistorico();
  </script>
</body>
</html>
