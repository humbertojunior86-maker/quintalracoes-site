<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Marcas — Quintal Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-header">
        <div>
          <div class="breadcrumb">Painel · Marcas</div>
          <h1>Marcas</h1>
        </div>
        <button class="btn btn--mostarda" id="btn-novo">+ Nova marca</button>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead><tr><th style="width:60px"></th><th>Nome</th><th>Slug</th><th>Cor</th><th>Ordem</th><th>Status</th><th style="text-align:right">Ações</th></tr></thead>
          <tbody id="lista"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal__header">
        <h2 id="modal-title">Nova marca</h2>
        <button class="modal__close" data-close>×</button>
      </div>
      <form id="form">
        <input type="hidden" id="m-id">

        <div class="form-group">
          <label class="form-label">Logo</label>
          <label class="uploader" for="m-logo-input">
            <input type="file" id="m-logo-input" accept="image/*">
            <img id="m-logo-preview" class="preview" style="display:none">
            <div id="m-logo-text">Clique para enviar logo</div>
          </label>
          <input type="hidden" id="m-logo-url">
        </div>

        <div class="form-group">
          <label class="form-label">Nome *</label>
          <input class="form-control" id="m-nome" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Slug *</label>
            <input class="form-control" id="m-slug" required>
          </div>
          <div class="form-group">
            <label class="form-label">Cor da marca</label>
            <input type="color" class="form-control" id="m-cor" style="padding:4px; height:38px;" value="#1A1A1A">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Ordem</label>
            <input type="number" class="form-control" id="m-ordem" value="0">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <label style="display:flex; gap:6px; align-items:center; padding-top:10px;">
              <input type="checkbox" id="m-ativo" checked> Ativo
            </label>
          </div>
        </div>
        <div class="modal__actions">
          <button type="button" class="btn" data-close>Cancelar</button>
          <button type="submit" class="btn btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/config.js"></script>
  <script type="module">
    import { supabase, requireAuth, uploadImage, toast } from '/admin/js/supabase-client.js';
    import { renderSidebar } from '/admin/js/sidebar.js';

    const auth = await requireAuth(['admin']);
    if (!auth) throw new Error('sem auth');
    renderSidebar(auth.perfil, 'marcas');

    function slugify(s) {
      return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    }
    function escapeHtml(s) {
      return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    async function load() {
      const { data } = await supabase.from('marcas').select('*').order('ordem');
      document.getElementById('lista').innerHTML = (data || []).map(m => `
        <tr>
          <td>${m.logo_url ? `<img class="thumb" src="${m.logo_url}">` : `<div class="thumb" style="background:${m.cor || '#eee'}"></div>`}</td>
          <td><strong>${escapeHtml(m.nome)}</strong></td>
          <td><code style="font-size:11px; color:var(--muted)">${m.slug}</code></td>
          <td><div style="width:24px; height:24px; border-radius:4px; background:${m.cor || '#eee'}; border:1px solid #ddd;"></div></td>
          <td>${m.ordem}</td>
          <td>${m.ativo ? '<span class="tag tag--success">ativo</span>' : '<span class="tag tag--danger">inativo</span>'}</td>
          <td><div class="actions">
            <button class="btn btn--sm" data-edit="${m.id}">Editar</button>
            <button class="btn btn--sm btn--danger" data-del="${m.id}">×</button>
          </div></td>
        </tr>
      `).join('') || '<tr><td colspan="7"><div class="empty">Nenhuma marca.</div></td></tr>';

      document.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => abrir(b.dataset.edit));
      document.querySelectorAll('[data-del]').forEach(b => b.onclick = () => excluir(b.dataset.del));
    }

    const modalBg = document.getElementById('modal-bg');
    document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => modalBg.classList.remove('is-open'));
    document.getElementById('btn-novo').onclick = () => abrir();

    document.getElementById('m-nome').addEventListener('input', e => {
      if (!document.getElementById('m-id').value) {
        document.getElementById('m-slug').value = slugify(e.target.value);
      }
    });

    function abrir(id = null) {
      document.getElementById('form').reset();
      document.getElementById('m-id').value = '';
      document.getElementById('m-logo-url').value = '';
      document.getElementById('m-logo-preview').style.display = 'none';
      document.getElementById('m-logo-text').textContent = 'Clique para enviar logo';
      document.getElementById('modal-title').textContent = 'Nova marca';
      document.getElementById('m-cor').value = '#1A1A1A';
      if (id) carregar(id);
      modalBg.classList.add('is-open');
    }
    async function carregar(id) {
      const { data } = await supabase.from('marcas').select('*').eq('id', id).single();
      document.getElementById('modal-title').textContent = 'Editar marca';
      document.getElementById('m-id').value = data.id;
      document.getElementById('m-nome').value = data.nome;
      document.getElementById('m-slug').value = data.slug;
      document.getElementById('m-cor').value = data.cor || '#1A1A1A';
      document.getElementById('m-ordem').value = data.ordem;
      document.getElementById('m-ativo').checked = data.ativo;
      document.getElementById('m-logo-url').value = data.logo_url || '';
      if (data.logo_url) {
        const img = document.getElementById('m-logo-preview');
        img.src = data.logo_url; img.style.display = 'block';
      }
    }

    document.getElementById('m-logo-input').addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      const txt = document.getElementById('m-logo-text');
      txt.textContent = 'Enviando…';
      try {
        const url = await uploadImage('marcas', f);
        document.getElementById('m-logo-url').value = url;
        const img = document.getElementById('m-logo-preview');
        img.src = url; img.style.display = 'block';
        txt.textContent = 'Pronto. Clique para trocar.';
      } catch (err) { toast(err.message,'error'); }
    });

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('m-id').value;
      const payload = {
        nome: document.getElementById('m-nome').value.trim(),
        slug: document.getElementById('m-slug').value.trim(),
        logo_url: document.getElementById('m-logo-url').value || null,
        cor: document.getElementById('m-cor').value,
        ordem: parseInt(document.getElementById('m-ordem').value || '0', 10),
        ativo: document.getElementById('m-ativo').checked,
      };
      const res = id
        ? await supabase.from('marcas').update(payload).eq('id', id)
        : await supabase.from('marcas').insert(payload);
      if (res.error) return toast(res.error.message, 'error');
      toast(id ? 'Marca atualizada' : 'Marca criada', 'success');
      modalBg.classList.remove('is-open');
      load();
    });

    async function excluir(id) {
      if (!confirm('Excluir esta marca?')) return;
      const { error } = await supabase.from('marcas').delete().eq('id', id);
      if (error) return toast(error.message,'error');
      toast('Excluída','success');
      load();
    }

    await load();
  </script>
</body>
</html>
